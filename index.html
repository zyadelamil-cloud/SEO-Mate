
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO-Mate AI | Expertise SEO Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Instrument+Serif:italic@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --nebula-1: #4f46e5;
            --nebula-2: #818cf8;
            --nebula-3: #c084fc;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow-x: hidden;
            background-color: #f8fafc;
        }
        .noise-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            pointer-events: none;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        .nebula-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            filter: blur(120px);
            opacity: 0.5;
            pointer-events: none;
        }
        .nebula-sphere {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(to right, var(--nebula-1), var(--nebula-2));
            animation: move 20s infinite alternate cubic-bezier(0.45, 0, 0.55, 1);
        }
        @keyframes move {
            from { transform: translate(-15%, -15%) scale(1); rotate: 0deg; }
            to { transform: translate(25%, 25%) scale(1.3); rotate: 180deg; }
        }
        .glass {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .instrument-serif { font-family: 'Instrument Serif', serif; }
        
        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }
        .animate-floating {
            animation: floating 4s ease-in-out infinite;
        }

        @keyframes splash-zoom-out {
            0% { transform: scale(1); opacity: 1; filter: blur(0px); }
            100% { transform: scale(50); opacity: 0; filter: blur(20px); }
        }
        
        .animate-exit-zoom {
            animation: splash-zoom-out 1.2s cubic-bezier(0.7, 0, 0.84, 0) forwards;
        }

        @keyframes app-reveal {
            0% { transform: scale(0.9); opacity: 0; filter: blur(10px); }
            100% { transform: scale(1); opacity: 1; filter: blur(0px); }
        }
        
        .animate-app-reveal {
            animation: app-reveal 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes splash-progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        
        .animate-splash-progress {
            animation: splash-progress 2s cubic-bezier(0.65, 0, 0.35, 1) forwards;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(79, 70, 229, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(79, 70, 229, 0.2); }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.11.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.45.4"
  }
}
</script>
</head>
<body class="text-slate-900">
    <div class="noise-overlay"></div>
    <div id="root"></div>
</body>
</html>
